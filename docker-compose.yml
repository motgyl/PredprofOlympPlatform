services:
  db:
    image: postgres:15
    container_name: ctf_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: ctf_app
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "5001:5001"

volumes:
  postgres_data: