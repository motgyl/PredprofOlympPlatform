{% extends "base.html" %}
{% block title %}Admin Panel{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row mb-4">
        <div class="col-12">
            <h2 class="text-white fw-bold mb-3">🛠 Панель Администратора</h2>
            <div class="d-flex gap-3">
                <a href="{{ url_for('admin_users') }}" class="btn btn-ctf-outline">Управление пользователями</a>
            </div>
        </div>
    </div>

    <!-- Статистика -->
    <div class="row g-3 mb-5">
        <div class="col-md-4">
            <div class="ctf-card p-3 text-center">
                <h3 class="text-accent">{{ users_count }}</h3>
                <span class="text-muted small">Пользователей</span>
            </div>
        </div>
        <div class="col-md-4">
            <div class="ctf-card p-3 text-center">
                <h3 class="text-success">{{ challenges_count }}</h3>
                <span class="text-muted small">Задач</span>
            </div>
        </div>
        <div class="col-md-4">
            <div class="ctf-card p-3 text-center">
                <h3 class="text-white">{{ solves_count }}</h3>
                <span class="text-muted small">Решений</span>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="ctf-card p-4 shadow-glow">
                
                <!-- Навигация (Табы) -->
                <ul class="nav nav-pills mb-4" id="adminTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active btn-sm" id="gen-tab" data-bs-toggle="tab" data-bs-target="#gen" type="button">⚡ Авто-генератор</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link btn-sm ms-2" id="manual-tab" data-bs-toggle="tab" data-bs-target="#manual" type="button">✍ Ручное создание</button>
                    </li>
                </ul>

                <div class="tab-content" id="adminTabContent">
                    
                    <!-- 1. ГЕНЕРАТОР -->
                    <div class="tab-pane fade show active" id="gen" role="tabpanel">
                        <form action="{{ url_for('admin_generate') }}" method="POST">
                            <div class="mb-3">
                                <label class="form-label text-muted">Категория</label>
                                <select name="category" class="form-control ctf-input">
                                    <option value="Cryptography">Cryptography</option>
                                    <option value="Linux">Linux</option>
                                    <option value="Network">Network</option>
                                    <option value="Forensics">Forensics</option>
                                    <option value="Logic">Logic</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted">Сложность</label>
                                <select name="difficulty" class="form-control ctf-input">
                                    <option value="Easy">Easy</option>
                                    <option value="Medium">Medium</option>
                                    <option value="Hard">Hard</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted">Количество</label>
                                <input type="number" name="count" class="form-control ctf-input" value="1" min="1" max="10">
                            </div>
                            <button type="submit" class="btn btn-ctf w-100">Сгенерировать</button>
                        </form>
                    </div>

                    <!-- 2. РУЧНОЕ СОЗДАНИЕ -->
                    <div class="tab-pane fade" id="manual" role="tabpanel">
                        <form action="{{ url_for('admin_create_challenge') }}" method="POST">
                            <div class="mb-3">
                                <label class="form-label text-muted">Название</label>
                                <input type="text" name="title" class="form-control ctf-input" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted">Описание (HTML поддерживается)</label>
                                <textarea name="description" class="form-control ctf-input" rows="3" required></textarea>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-muted">Категория</label>
                                    <select name="category_id" class="form-control ctf-input">
                                        {% for cat in categories %}
                                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-muted">Сложность</label>
                                    <select name="difficulty" class="form-control ctf-input">
                                        <option value="Easy">Easy</option>
                                        <option value="Medium">Medium</option>
                                        <option value="Hard">Hard</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-8 mb-3">
                                    <label class="form-label text-muted">Флаг</label>
                                    <input type="text" name="flag" class="form-control ctf-input" placeholder="bobr{secret_text}" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label text-muted">Очки</label>
                                    <input type="number" name="points" class="form-control ctf-input" value="100">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted">Подсказка</label>
                                <input type="text" name="hint" class="form-control ctf-input">
                            </div>
                            <button type="submit" class="btn btn-ctf w-100">Создать задание</button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
