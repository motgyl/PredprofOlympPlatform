{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-5 col-lg-4">
            
            <div class="ctf-card p-4 p-md-5 shadow-glow">
                <h2 class="text-center mb-4 fw-bold">Регистрация</h2>

                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="alert alert-ctf-danger mb-4" role="alert">
                            {{ messages[0] }}
                        </div>
                    {% endif %}
                {% endwith %}

                <form method="POST" action="/register">
                    <div class="mb-3">
                        <label class="form-label text-muted small text-uppercase fw-bold">Придумайте ник</label>
                        <div class="input-group">
                            <span class="input-group-text ctf-input-icon">
                                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            </span>
                            <input type="text" name="username" class="form-control ctf-input" placeholder="Neo" required autocomplete="off">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted small text-uppercase fw-bold">Пароль</label>
                        <div class="input-group">
                            <span class="input-group-text ctf-input-icon">
                                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                            </span>
                            <input type="password" name="password" class="form-control ctf-input" placeholder="••••••••" required>
                        </div>
                        <div class="form-text text-muted small mt-2">
                            Пароль должен быть сложным, иначе вас взломают :)
                        </div>
                    </div>

                    <button type="submit" class="btn btn-ctf w-100 py-2 mb-3">
                        Создать аккаунт
                    </button>
                </form>

                <div class="text-center mt-3">
                    <span class="text-muted small">Уже есть аккаунт?</span>
                    <a href="/login" class="text-accent fw-bold ms-1" style="text-decoration: underline;">Войти</a>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
