<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/base.css">
    <title>{% block title %}{% endblock %}</title>
</head>
<body>
    <!-- NAVBAR -->
     <nav class="navbar navbar-expand-lg ctf-navbar">
        <div class="container">
            <a class="navbar-brand" href="/">
                &lt;BobrCTF /&gt;
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#ctfNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="ctfNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="/knowledge_base">База знаний</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pvp">Соревнование 1 на 1</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/board">Рейтинг</a>
                    </li>

                    {% if current_user.is_authenticated %}
                        
                        <li class="nav-item ms-lg-3">
                            <a href="/profile" class="btn btn-ctf d-flex align-items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                    <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                                    <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z"/>
                                </svg>
                                {{ current_user.username }}
                            </a>
                        </li>
                        
                        <li class="nav-item ms-lg-2">
                            <a href="/logout" class="btn btn-ctf-outline btn-sm">
                                Выйти
                            </a>
                        </li>

                    {% else %}
                        
                        <li class="nav-item ms-lg-3">
                            <a href="/login" class="btn btn-ctf-outline">Вход</a>
                        </li>
                        <li class="nav-item ms-lg-2">
                            <a href="/register" class="btn btn-ctf">Регистрация</a>
                        </li>
                    {% endif %}
                    
                </ul>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->

    {% block content %}{% endblock %}

    <!-- FOOTER -->
    <footer class="ctf-footer">
        <div class="container">
            &copy; 2026 BobrCTF. All rights reserved by Beavers.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
